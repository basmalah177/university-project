<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="white-page">

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contactus.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="form-main">
        <div class="main-flex-wrapper"> 

            <section class="form-container">
                <h2>Add New Course</h2>
                <p>Fill in the details below to add a new course to your table.</p>
                
                <form>
                    <div class="input-group">
                        <label>Course Name:</label>
                        <input type="text"  >
                    </div>

                    <div class="input-group">
                        <label>Instructor:</label>
                        <input type="text" >
                    </div>

                    <div class="input-group">
                        <label>Credit Hours:</label>
                        <input type="number" min="1" max="4">

                    </div>

                    <div class="input-group">
                        <label>Notes:</label>
                        <textarea ></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Save Course</button>
                </form>
            </section>

            <section class="image-container">
                <img src="course-image.png" >
            </section>
        </div> </main>

    <footer>
        <p>Copyright &copy; 2026 | Designed by (Eng:Basmalah Ahmed Osman)</p>
    </footer>

</body>
</html>
